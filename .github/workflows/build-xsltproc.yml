# .github/workflows/build-xsltproc.yml
#
# Builds the tiniest possible static xsltproc for Linux and Windows.
#
# Size-reduction stack:
#   1. ReleaseSmall  – Zig's -Os, optimize for binary size
#   2. Disable unused libxml2/libxslt features (no FTP, HTTP, schemas, debug…)
#   3. Strip all symbols and debug info
#   4. UPX --best --lzma  – typically 50-70 % further compression
#
name: Build static xsltproc (tiny)

permissions:
  contents: write

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux-musl
            artifact: xsltproc-linux-amd64
            ext: ""
          - target: x86_64-windows-gnu
            artifact: xsltproc-windows-amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
          use-cache: false

      # ── clone zig-libxml2 ──────────────────────────────────────────
      - name: Fetch zig-libxml2
        run: git clone --depth 1 https://github.com/ianprime0509/zig-libxml2.git

      # ── patch for Windows cross-compilation ────────────────────────
      - name: Patch zig-libxml2 for Windows cross-compilation
        run: |
          cd zig-libxml2

          # Detect Windows target
          sed -i '/const libxml2_upstream/i\    const is_windows = target.result.os.tag == .windows;' build.zig

          # POSIX headers/funcs → false on Windows
          for flag in \
            HAVE_ARPA_INET_H HAVE_DLFCN_H HAVE_DLOPEN HAVE_MMAP HAVE_MUNMAP \
            HAVE_NETDB_H HAVE_NETINET_IN_H HAVE_POLL_H HAVE_PTHREAD_H \
            HAVE_SYS_MMAN_H HAVE_SYS_SELECT_H HAVE_SYS_SOCKET_H; do
            sed -i "s/\.${flag} = true/.${flag} = !is_windows/" build.zig
          done

          # Socket type
          sed -i 's/\.XML_SOCKLEN_T = "socklen_t"/.XML_SOCKLEN_T = if (is_windows) "int" else "socklen_t"/' build.zig

          # libxslt POSIX funcs → false on Windows
          for flag in HAVE_CLOCK_GETTIME HAVE_GMTIME_R HAVE_LOCALTIME_R HAVE_STRXFRM_L; do
            sed -i "s/\.${flag} = true/.${flag} = !is_windows/" build.zig
          done

          # Link winsock2 on Windows
          sed -i '/const libxml2_lib = b.addLibrary/i\    if (is_windows) libxml2_mod.linkSystemLibrary("ws2_32", .{});' build.zig

          # Remove xmllint and xmlcatalog executables (we only need xsltproc)
          # These tools fail to cross-compile for Windows due to POSIX dependencies
          sed -i '/const xmllint_mod/,/b\.installArtifact(xmllint_exe);/d' build.zig
          sed -i '/const xmlcatalog_mod/,/b\.installArtifact(xmlcatalog_exe);/d' build.zig

          # Define LIBXML_STATIC / LIBXSLT_STATIC / LIBEXSLT_STATIC on Windows
          # Without these, headers use __declspec(dllimport) causing LNK4217 errors
          sed -i '/libxml2_mod.addCSourceFiles/i\    if (is_windows) libxml2_mod.addCMacro("LIBXML_STATIC", "1");' build.zig
          sed -i '/libxslt_mod.addCSourceFiles/i\    if (is_windows) { libxslt_mod.addCMacro("LIBXML_STATIC", "1"); libxslt_mod.addCMacro("LIBXSLT_STATIC", "1"); }' build.zig
          sed -i '/libexslt_mod.addCSourceFiles/i\    if (is_windows) { libexslt_mod.addCMacro("LIBXML_STATIC", "1"); libexslt_mod.addCMacro("LIBXSLT_STATIC", "1"); libexslt_mod.addCMacro("LIBEXSLT_STATIC", "1"); }' build.zig
          sed -i '/xsltproc_mod.addCSourceFile/i\    if (is_windows) { xsltproc_mod.addCMacro("LIBXML_STATIC", "1"); xsltproc_mod.addCMacro("LIBXSLT_STATIC", "1"); xsltproc_mod.addCMacro("LIBEXSLT_STATIC", "1"); }' build.zig

      # ── build: size-optimised ──────────────────────────────────────
      - name: Build xsltproc (ReleaseSmall, features stripped)
        run: |
          cd zig-libxml2
          zig build \
            -Doptimize=ReleaseSmall \
            -Dtarget=${{ matrix.target }} \
            -Dxslt \
            -Dftp=false \
            -Dhttp=false \
            -Dschemas=false \
            -Dschematron=false \
            -Dc14n=false \
            -Ddebug=false \
            -Dmem-debug=false \
            -Dmodules=false \
            -Dxptr=false \
            -Dxptr-locs=false \
            -Dxslt-debug=false \
            -Dxslt-debugger=false \
            -Dxslt-profiler=false \
            -Dxslt-mem-debug=false \
            -Diso8859x=false \
            -Dwriter=false

      # ── strip symbols ──────────────────────────────────────────────
      - name: Strip binary
        run: |
          BIN=zig-libxml2/zig-out/bin/xsltproc${{ matrix.ext }}
          echo "Before strip: $(stat --printf='%s' "$BIN") bytes"
          # llvm-objcopy --strip-all works for both ELF and PE
          llvm-strip "$BIN" 2>/dev/null \
            || strip "$BIN" 2>/dev/null \
            || echo "strip unavailable, skipping"
          echo "After strip:  $(stat --printf='%s' "$BIN") bytes"

      # ── UPX compress ───────────────────────────────────────────────
      - name: Install UPX
        run: |
          UPX_VER=4.2.4
          curl -fsSL "https://github.com/upx/upx/releases/download/v${UPX_VER}/upx-${UPX_VER}-amd64_linux.tar.xz" \
            | tar -xJ --strip-components=1 -C /usr/local/bin "upx-${UPX_VER}-amd64_linux/upx"
          upx --version | head -1

      - name: UPX compress
        run: |
          BIN=zig-libxml2/zig-out/bin/xsltproc${{ matrix.ext }}
          echo "Before UPX: $(stat --printf='%s' "$BIN") bytes"
          upx --best --lzma "$BIN" || echo "UPX failed (PE format issue?), skipping"
          echo "After UPX:  $(stat --printf='%s' "$BIN") bytes"

      # ── report final size ──────────────────────────────────────────
      - name: Report size
        run: |
          BIN=zig-libxml2/zig-out/bin/xsltproc${{ matrix.ext }}
          SIZE=$(stat --printf='%s' "$BIN")
          SIZE_KB=$((SIZE / 1024))
          echo "### ${{ matrix.artifact }}: ${SIZE_KB} KB (${SIZE} bytes)" >> "$GITHUB_STEP_SUMMARY"
          echo "Final binary: ${SIZE_KB} KB (${SIZE} bytes)"

      # ── package & upload ───────────────────────────────────────────
      - name: Package
        run: |
          cp nmap-intel.xsl zig-libxml2/zig-out/bin/
          cd zig-libxml2/zig-out/bin
          tar czf ${{ matrix.artifact }}.tar.gz xsltproc${{ matrix.ext }} nmap-intel.xsl

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: zig-libxml2/zig-out/bin/${{ matrix.artifact }}.tar.gz

  # ── create/update release with all assets ──────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v$(date -u +%Y%m%d%H%M%S)"
            gh release create "$TAG" --title "NetIntel $TAG" --notes "Static xsltproc binaries (Linux amd64 + Windows amd64) and XML/XSL templates" --latest
          fi
          for f in artifacts/*/*.tar.gz; do
            gh release upload "$TAG" "$f" --clobber
          done
